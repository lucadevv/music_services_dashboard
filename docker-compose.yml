services:
  dashboard:
    build:
      context: .
      target: dev
    image: music-dashboard
    container_name: music_dashboard
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - music_network

networks:
  music_network:
    external: true
