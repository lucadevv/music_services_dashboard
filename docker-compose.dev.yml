services:
  app:
    container_name: music_services_dashboard
    build:
      context: .
      target: dev
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    networks:
      - music_network

networks:
  music_network:
    external: true
